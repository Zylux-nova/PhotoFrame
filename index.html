<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片相框生成器</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div class="container">
    <div class="left-panel">
        <h3>📷 相框参数设置</h3>
        <!-- 图片上传 -->
        <div class="item">
            <label>上传原图：</label>
            <input type="file" id="imgInput" accept="image/*" multiple>
            <div class="batch-box">
                <input type="checkbox" id="batchCheck"> <label>批量处理</label>
            </div>
        </div>
        <!-- 背景图上传（相框背景） -->
        <div class="item">
            <label>相框自定义背景图：</label>
            <input type="file" id="bgInput" accept="image/*">
        </div>

        <!-- 原图设置 -->
        <div class="item">
            <p>原图缩放：<span id="scaleVal">90%</span></p>
            <input type="range" id="scale" min="10" max="100" value="90">
        </div>
        <div class="item">
            <p>圆角大小：<span id="radiusVal">33px</span></p>
            <input type="range" id="radius" min="0" max="80" value="33">
        </div>
        <div class="item">
            <p>立体阴影：<span id="shadowVal">0.35</span></p>
            <input type="range" id="shadow" min="0" max="100" value="35">
        </div>

        <!-- 相框背景设置 -->
        <div class="item">
            <p>相框宽度：<span id="frameWVal">20%</span></p>
            <input type="range" id="frameW" min="5" max="50" value="20">
        </div>
        <div class="item">
            <p>背景模糊度：<span id="blurVal">8px</span></p>
            <input type="range" id="blur" min="0" max="30" value="8">
        </div>

        <!-- 相机品牌区域 -->
        <div class="item brand-area">
            <p>相机品牌（底部水印）</p>
            <div class="brand-tab">
                <button class="theme-btn" data-type="light">浅色</button>
                <button class="theme-btn" data-type="dark">深色</button>
            </div>
            <div class="brand-list">
                <button class="brand-btn">Sony</button>
                <button class="brand-btn">Nikon</button>
                <button class="brand-btn">Canon</button>
                <button class="brand-btn">Fujifilm</button>
                <button class="brand-btn">Leica</button>
                <button class="brand-btn">DJI</button>
                <button class="brand-btn">Olympus</button>
                <button class="brand-btn">Panasonic</button>
                <button class="brand-btn">Ricoh</button>
            </div>
            <div class="font-set">
                <label>文字颜色：</label>
                <input type="radio" name="fontColor" value="#fff" checked>白字
                <input type="radio" name="fontColor" value="#000">黑字
            </div>
            <div class="logo-opt">
                <p>Logo大小:<span id="logoSizeVal">30px</span></p>
                <input type="range" id="logoSize" min="10" max="80" value="30">
            </div>
        </div>

        <button id="downBtn" class="down">下载成品图片</button>
    </div>

    <div class="right-preview">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script src="./js/main.js"></script>
</body>
</html>
