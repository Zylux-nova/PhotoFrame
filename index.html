<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片相框生成器</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div class="wrap">
    <!-- 左侧控制面板 -->
    <div class="left-sidebar">
        <h1 class="title">PhotoFrame</h1>

        <!-- 1.图像源区域 -->
        <div class="panel-block">
            <h3>1.图像源</h3>
            <div class="btn-row">
                <label class="file-btn">选择照片
                    <input type="file" id="imgInput" accept="image/*" multiple hidden>
                </label>
                <span id="fileName">未选择文件</span>
            </div>
            <div class="batch-switch">
                <span>批量关闭</span>
                <input type="checkbox" id="batchCheck">
                <span>批量开启</span>
            </div>

            <div class="bg-mode">
                <p>相框背景</p>
                <div class="mode-btn-group">
                    <button class="mode-btn active" data-val="origin">原图模糊</button>
                    <button class="mode-btn" data-val="custom">自定义底图</button>
                    <button class="mode-btn" data-val="none">纯黑背景</button>
                </div>
                <input type="file" id="customBgInput" accept="image/*" hidden>
            </div>
        </div>

        <!-- 2.相框参数 -->
        <div class="panel-block">
            <h3>2.相框样式设置</h3>
            <div class="slider-item">
                <div class="slider-info">
                    <span>背景模糊强度</span>
                    <span id="blurVal">40px</span>
                </div>
                <input type="range" id="blur" min="0" max="80" value="40">
            </div>
            <div class="slider-item">
                <div class="slider-info">
                    <span>相框边框宽度</span>
                    <span id="frameWVal">80px</span>
                </div>
                <input type="range" id="frameW" min="10" max="150" value="80">
            </div>
            <div class="slider-item">
                <div class="slider-info">
                    <span>原图缩放比例</span>
                    <span id="scaleVal">90%</span>
                </div>
                <input type="range" id="scale" min="30" max="100" value="90">
            </div>
            <div class="slider-item">
                <div class="slider-info">
                    <span>图片圆角</span>
                    <span id="radiusVal">20px</span>
                </div>
                <input type="range" id="radius" min="0" max="60" value="20">
            </div>
            <div class="slider-item">
                <div class="slider-info">
                    <span>立体阴影深度</span>
                    <span id="shadowVal">0.5</span>
                </div>
                <input type="range" id="shadow" min="0" max="100" value="50">
            </div>
        </div>

        <!-- 3.品牌&EXIF参数（新增EXIF） -->
        <div class="panel-block">
            <h3>3.相机品牌与照片参数</h3>
            <div class="brand-tab">
                <button class="tab-btn active">白色文字</button>
                <button class="tab-btn">黑色文字</button>
            </div>
            <div class="brand-grid">
                <button class="brand" data-logo="sony">Sony</button>
                <button class="brand" data-logo="nikon">Nikon</button>
                <button class="brand" data-logo="canon">Canon</button>
                <button class="brand" data-logo="fuji">Fujifilm</button>
                <button class="brand" data-logo="leica">Leica</button>
                <button class="brand" data-logo="dji">DJI</button>
                <button class="brand" data-logo="oly">Olympus</button>
                <button class="brand" data-logo="pan">Panasonic</button>
                <button class="brand" data-logo="ricoh">Ricoh</button>
            </div>
            <div class="font-opt">
                <label>自动读取EXIF参数：</label>
                <input type="checkbox" id="useExif" checked>启用
            </div>
            <div class="slider-item">
                <div class="slider-info">
                    <span>品牌/参数字号</span>
                    <span id="logoSizeVal">35px</span>
                </div>
                <input type="range" id="logoSize" min="15" max="70" value="35">
            </div>
            <div class="exif-info" id="exifTip">
                EXIF：等待上传图片自动识别
            </div>
        </div>

        <!-- 导出 -->
        <button id="downloadBtn" class="down-btn">导出高清PNG图片</button>
    </div>

    <!-- 右侧预览画布 -->
    <div class="preview-box">
        <div id="emptyTip">
            <div class="icon-cam">📷</div>
            <p>点击左侧选择照片开始制作相框</p>
        </div>
        <canvas id="canvas"></canvas>
    </div>
</div>

<script src="./js/main.js"></script>
</body>
</html>
